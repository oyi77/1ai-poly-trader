<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="16" fill="#0f172a"/>
  <!-- Candlestick chart bars -->
  <rect x="5" y="18" width="4" height="8" rx="1" fill="#22c55e"/>
  <line x1="7" y1="14" x2="7" y2="18" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="7" y1="26" x2="7" y2="28" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="12" y="12" width="4" height="10" rx="1" fill="#ef4444"/>
  <line x1="14" y1="8" x2="14" y2="12" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="22" x2="14" y2="25" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="19" y="10" width="4" height="12" rx="1" fill="#22c55e"/>
  <line x1="21" y1="6" x2="21" y2="10" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21" y1="22" x2="21" y2="26" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Trend line overlay -->
  <polyline points="5,22 12,16 19,13 27,8" stroke="#1d90ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Blue dot at tip -->
  <circle cx="27" cy="8" r="1.8" fill="#1d90ff"/>
