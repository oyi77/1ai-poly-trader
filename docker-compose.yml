services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "backend.core.orchestrator"]
    env_file:
      - .env
    depends_on:
      - api
    restart: unless-stopped
